<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icon.png" alt="Bypass">
                <h1>Bypass<span>Pro</span></h1>
            </div>
            <div class="status-badge">Active</div>
        </header>

        <main>
            <div class="mode-card">
                <div class="mode-info">
                    <h3>Auto-Clean</h3>
                    <p>Remove login walls automatically</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="autoBypass" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="button-group">
                <button id="zapMode" class="primary-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                    </svg>
                    Enter Zap Mode
                </button>
                
                <button id="autoFill" class="secondary-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Fill Random ID
                </button>

                <button id="bypassVerify" class="secondary-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Bypass Verification
                </button>
            </div>
        </main>

        <footer>
            <p>Right-click any element to "Zap" it manually</p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
